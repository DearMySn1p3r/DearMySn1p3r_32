<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ARCH://RESONANCE_NEXUS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@100;300;500;700;900&display=swap');

:root{
  --bg:#0a0a0a;
  --panel:#0f0f0f;
  --ink:#fff;
  --dim:rgba(255,255,255,0.45);
  --dimmer:rgba(255,255,255,0.12);
  --dimmest:rgba(255,255,255,0.05);
  --font:'Orbitron','Noto Sans KR',sans-serif;
  --kr:'Noto Sans KR',sans-serif;
}

*{box-sizing:border-box;outline:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--ink);}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}

body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--font);min-height:100vh;
  user-select:none;cursor:none;
}

/* ========= CURSOR ========= */
#cursor{
  position:fixed;width:32px;height:32px;border:1px solid var(--ink);
  border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);
  z-index:10000;mix-blend-mode:difference;
  transition:width 0.1s,height 0.1s;
}
#cursor::before,#cursor::after{content:'';position:absolute;background:var(--ink);}
#cursor::before{top:50%;left:-3px;right:-3px;height:1px;}
#cursor::after{left:50%;top:-3px;bottom:-3px;width:1px;}
.click-anim{width:16px !important;height:16px !important;}

/* ========= EFFECTS (subtle) ========= */
.scanline{
  position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:0.6;
  background:linear-gradient(rgba(0,0,0,0) 50%,rgba(255,255,255,0.018) 50%);
  background-size:100% 3px;
}
.noise-bg{
  position:fixed;inset:0;pointer-events:none;z-index:8999;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ========= BOOT ========= */
#boot{
  position:fixed;inset:0;background:#000;z-index:20000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#boot .logo-img{
  width:80px;height:80px;
  filter:drop-shadow(0 0 18px rgba(255,255,255,0.7));
  animation:bootPulse 1.6s ease-in-out infinite;
}
@keyframes bootPulse{
  0%,100%{opacity:0.6;transform:scale(0.95);}
  50%{opacity:1;transform:scale(1.05);}
}
#boot .logo-text{
  font-size:32px;font-weight:900;letter-spacing:12px;
  text-shadow:0 0 20px var(--ink);
}
#boot .sub{font-size:10px;letter-spacing:6px;color:var(--dim);margin-top:-8px;}
#boot .bar{width:340px;height:1px;background:rgba(255,255,255,0.15);overflow:hidden;}
#boot .bar > div{height:100%;width:0%;background:var(--ink);box-shadow:0 0 14px var(--ink);animation:fill 1.4s forwards ease-out;}
@keyframes fill{to{width:100%}}

/* ========= HEADER ========= */
header{
  height:64px;border-bottom:1px solid var(--dimmer);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;background:rgba(0,0,0,0.85);position:relative;z-index:100;
}
header .left{display:flex;align-items:center;gap:18px;}
header .logo-img{
  height:36px;width:36px;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
}
header h1{
  font-size:17px;font-weight:900;letter-spacing:5px;margin:0;
  text-shadow:0 0 8px rgba(255,255,255,0.5);
}
header .sub{font-size:9px;letter-spacing:4px;color:var(--dim);font-weight:300;margin-top:2px;}
header .right{font-size:10px;color:var(--dim);text-align:right;line-height:1.6;font-family:monospace;}
header .right b{color:#fff;font-weight:700;}

/* ========= LAYOUT ========= */
#stage{
  padding:28px;display:grid;grid-template-columns:1fr 380px;gap:24px;
  max-width:1640px;margin:0 auto;
}

/* ========= CAPTURE AREA ========= */
#capture-area{
  background:var(--panel);
  border:1px solid var(--dimmer);
  padding:32px;position:relative;
  min-height:760px;
}

.corner-br{position:absolute;width:18px;height:18px;border:1.5px solid var(--ink);}
.corner-br.tl{top:-1px;left:-1px;border-right:none;border-bottom:none;}
.corner-br.tr{top:-1px;right:-1px;border-left:none;border-bottom:none;}
.corner-br.bl{bottom:-1px;left:-1px;border-right:none;border-top:none;}
.corner-br.br{bottom:-1px;right:-1px;border-left:none;border-top:none;}

/* capture header */
.cap-hd{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding-bottom:18px;border-bottom:1px solid var(--dimmer);margin-bottom:32px;
}
.cap-hd .title-block .ttl{
  font-size:22px;font-weight:900;letter-spacing:5px;line-height:1;
  text-shadow:0 0 12px rgba(255,255,255,0.5);
}
.cap-hd .title-block .sub{font-size:9px;letter-spacing:3px;color:var(--dim);margin-top:8px;}
.cap-hd .id-block{text-align:right;font-family:monospace;font-size:9px;color:var(--dim);line-height:1.8;letter-spacing:1px;}
.cap-hd .id-block b{color:#fff;font-weight:700;letter-spacing:2px;}

/* main grid */
.cap-main{
  display:grid;grid-template-columns:1fr 260px 1fr;gap:24px;
}

/* ========= CHARACTER CARD ========= */
.char-card{
  display:flex;flex-direction:column;gap:18px;position:relative;
}
.char-card .idx{
  font-size:9px;letter-spacing:4px;color:var(--dim);
  padding-bottom:8px;border-bottom:1px solid var(--dimmer);
  display:flex;justify-content:space-between;align-items:center;
}
.char-card .idx .dot{width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff;}

/* photo */
.photo-frame{
  width:100%;border:1px solid var(--dimmer);
  background:#000;
  position:relative;overflow:hidden;
  aspect-ratio:1/1;
  touch-action:none;
}
.photo-frame.has-photo{cursor:grab;}
.photo-frame.dragging{cursor:grabbing;}
.photo-frame > *{position:absolute;}
.photo-img{
  top:50%;left:50%;
  transform-origin:center center;
  will-change:transform;
  user-select:none;-webkit-user-drag:none;
  pointer-events:none;display:block;
  max-width:none;max-height:none;
}
.photo-img.fit-h{height:100%;width:auto;}
.photo-img.fit-w{width:100%;height:auto;}
.photo-frame .empty{
  inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--dim);
}
.photo-frame .empty svg{opacity:0.3;}
.photo-frame .ph-corner{
  position:absolute;width:12px;height:12px;border:1px solid var(--ink);z-index:2;
  pointer-events:none;
}
.photo-frame .ph-corner.tl{top:6px;left:6px;border-right:none;border-bottom:none;}
.photo-frame .ph-corner.tr{top:6px;right:6px;border-left:none;border-bottom:none;}
.photo-frame .ph-corner.bl{bottom:6px;left:6px;border-right:none;border-top:none;}
